<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryunosuke Aoki</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #666666;
      --line: #dddddd;
      --max: 720px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      line-height: 1.8;
    }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 56px 24px 80px;
    }

    header {
      margin-bottom: 48px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      margin: 0 0 10px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.98rem;
      margin: 0;
    }

    .photo {
      width: 100%;
      max-width: 280px;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      margin: 0 0 32px;
      border: 1px solid var(--line);
    }

    section {
      padding: 24px 0;
      border-top: 1px solid var(--line);
    }

    h2 {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 0 0 14px;
    }

    p {
      margin: 0;
      font-size: 1rem;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li + li {
      margin-top: 10px;
    }

    a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--line);
    }

    a:hover {
      border-bottom-color: var(--text);
    }

    footer {
      padding-top: 32px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 32px 18px 56px;
      }

      h1 {
        font-size: 1.7rem;
      }

      .photo {
        max-width: 180px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Ryunosuke Aoki</h1>
      <p class="subtitle">Sound / Field Recording / Research / Design</p>
    </header>

    <img class="photo" src="profile.jpg" alt="Ryunosuke Aokiの写真" />

    <section>
      <h2>About</h2>
      <p>
        青木隆之助。フィールドレコーディング、サウンドスケープ研究、デザイン、制作を横断しながら活動しています。
        音を通して、都市や風景、人の気配を記録し、考え、表現しています。
      </p>
    </section>

    <section>
      <h2>Works</h2>
      <ul>
        <li><a href="#">Field Recordings</a></li>
        <li><a href="#">Projects</a></li>
        <li><a href="#">Writing</a></li>
      </ul>
    </section>

    <section>
      <h2>Links</h2>
      <ul>
        <li><a href="#">Instagram</a></li>
        <li><a href="#">GitHub</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </section>

    <footer>
      <p>© Ryunosuke Aoki</p>
    </footer>
  </main>
</body>
</html>
