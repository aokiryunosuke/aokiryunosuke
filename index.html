<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>青木隆之助｜AOKI Ryunosuke</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #777777;
      --line: #e3e3e3;
      --max: 580px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 42px 18px 60px;
    }

    header {
      margin-bottom: 34px;
    }

    h1 {
      font-size: 1.45rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      margin: 0 0 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      margin: 0;
    }

    .photo {
      width: 100%;
      max-width: 200px;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      margin: 0 0 22px;
      border: 1px solid var(--line);
    }

    section {
      padding: 16px 0;
      border-top: 1px solid var(--line);
    }

    h2 {
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0 0 9px;
      color: var(--muted);
    }

    p {
      margin: 0;
      font-size: 0.9rem;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      font-size: 0.9rem;
    }

    li + li {
      margin-top: 7px;
    }

    a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease;
    }

    a:hover {
      border-bottom-color: var(--line);
    }

    footer {
      padding-top: 22px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 28px 14px 44px;
      }

      h1 {
        font-size: 1.25rem;
      }

      .subtitle {
        font-size: 0.76rem;
      }

      .photo {
        max-width: 150px;
      }

      p,
      li {
        font-size: 0.88rem;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>青木隆之助｜AOKI Ryunosuke</h1>
      <p class="subtitle">いろ・啼鳥｜聴的環境｜Sound Pieces</p>
    </header>

    <img class="photo" src="profile.jpg" alt="青木隆之助｜AOKI Ryunosuke" />

    <section>
      <h2>紹介｜Profile</h2>
      <p>
        平成十五年十月九日、神奈川県川崎市川崎区生まれ。青山学院大学在学中。
        身長162cm、視力0.1程度。
      </p>
    </section>

    <section>
      <h2>作品｜Works</h2>
      <ul>
        <li><a href="https://aokiryunosuke.github.io/fieldrecordingnotes/">Field Recordings</a></li>
        <li><a href="#">Projects</a></li>
        <li><a href="#">Writing</a></li>
      </ul>
    </section>

    <section>
      <h2>SNSアカウント｜Accounts</h2>
      <ul>
        <li><a href="https://www.instagram.com/aoki_ryunosuke/">Instagram</a></li>
        <li><a href="#">GitHub</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </section>

    <footer>
      <p>© AOKI Ryunosuke</p>
    </footer>
  </main>
</body>
</html>
