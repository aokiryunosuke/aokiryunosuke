<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>青木隆之助｜AOKI Ryunosuke</title>
  <style>
    :root {
      --bg: #f8fbfc;
      --text: #111111;
      --muted: #666666;
      --line: rgba(80, 95, 110, 0.22);
      --max: 640px;
      --river-1: rgba(90, 205, 245, 0.28);
      --river-2: rgba(235, 120, 190, 0.24);
      --river-3: rgba(245, 210, 60, 0.26);
      --river-4: rgba(120, 120, 128, 0.22);
      --river-5: rgba(70, 170, 95, 0.24);
      --river-6: rgba(150, 90, 220, 0.24);
      --mist: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--text);
      font-family: "YuMincho", "Yu Mincho", "Hiragino Mincho ProN", "Hiragino Mincho Pro", "Noto Serif JP", serif;
      font-weight: 700;
      line-height: 1.95;
      background:
        linear-gradient(180deg, rgba(248, 251, 252, 0.95), rgba(241, 248, 250, 0.95)),
        linear-gradient(135deg, rgba(225, 236, 242, 0.48), rgba(247, 250, 251, 0.72));
      position: relative;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -12% -10%;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        radial-gradient(120% 20% at 8% 10%, transparent 61%, var(--river-2) 64%, transparent 68%),
        radial-gradient(140% 18% at 80% 18%, transparent 61%, var(--river-1) 64%, transparent 68%),
        radial-gradient(135% 18% at 15% 30%, transparent 61%, var(--river-5) 64%, transparent 68%),
        radial-gradient(150% 18% at 72% 42%, transparent 61%, var(--river-3) 64%, transparent 68%),
        radial-gradient(145% 18% at 14% 56%, transparent 61%, var(--river-4) 64%, transparent 68%),
        radial-gradient(140% 18% at 78% 68%, transparent 61%, var(--river-6) 64%, transparent 68%),
        radial-gradient(145% 18% at 10% 84%, transparent 61%, var(--river-3) 64%, transparent 68%);
      animation: riverA 13s ease-in-out infinite alternate;
      filter: blur(1.2px);
    }

    body::after {
      background:
        radial-gradient(130% 16% at 88% 8%, transparent 62%, var(--mist) 65%, transparent 69%),
        radial-gradient(135% 16% at 10% 22%, transparent 62%, var(--river-1) 65%, transparent 69%),
        radial-gradient(145% 16% at 86% 34%, transparent 62%, var(--river-2) 65%, transparent 69%),
        radial-gradient(150% 16% at 12% 50%, transparent 62%, var(--river-5) 65%, transparent 69%),
        radial-gradient(150% 16% at 86% 64%, transparent 62%, var(--river-4) 65%, transparent 69%),
        radial-gradient(145% 16% at 18% 78%, transparent 62%, var(--river-6) 65%, transparent 69%);
      animation: riverB 10s ease-in-out infinite alternate;
      filter: blur(1px);
      opacity: 0.95;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: var(--max);
      margin: 0 auto;
      padding: 64px 22px 84px;
    }

    header {
      margin-bottom: 42px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1.45;
    }

    .subtitle {
      margin: 0;
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      color: var(--muted);
    }

    .photo {
      display: block;
      width: 100%;
      max-width: 220px;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      margin: 0 0 28px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
    }

    section {
      padding: 20px 0 22px;
      border-top: 1px solid var(--line);
    }

    h2 {
      margin: 0 0 12px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    p {
      margin: 0;
      font-size: 0.98rem;
      text-shadow: 0 0 1px rgba(255,255,255,0.08);
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .link-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .button-link {
      display: inline-block;
      padding: 9px 15px;
      border: 1px solid rgba(17,17,17,0.8);
      color: var(--text);
      text-decoration: none;
      background: rgba(255,255,255,0.06);
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1.3;
      transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .button-link:hover {
      background: rgba(17,17,17,0.9);
      color: #fff;
      transform: translateY(-1px);
    }

    footer {
      padding-top: 28px;
      color: var(--muted);
      font-size: 0.76rem;
      letter-spacing: 0.08em;
    }

    @keyframes riverA {
      0% {
        transform: translate3d(-2%, 0%, 0) scale(1.02) rotate(-0.6deg);
      }
      50% {
        transform: translate3d(2%, 1.5%, 0) scale(1.05) rotate(0.4deg);
      }
      100% {
        transform: translate3d(-3%, -1%, 0) scale(1.03) rotate(-0.8deg);
      }
    }

    @keyframes riverB {
      0% {
        transform: translate3d(2%, -1%, 0) scale(1.02) rotate(0.5deg);
      }
      50% {
        transform: translate3d(-2%, 1%, 0) scale(1.04) rotate(-0.4deg);
      }
      100% {
        transform: translate3d(3%, 0%, 0) scale(1.03) rotate(0.7deg);
      }
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 40px 16px 56px;
      }

      h1 {
        font-size: 1.45rem;
      }

      .subtitle {
        font-size: 0.74rem;
      }

      .photo {
        max-width: 170px;
      }

      p,
      .button-link {
        font-size: 0.86rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body::before,
      body::after {
        animation: none;
      }

      .button-link {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>青木隆之助｜AOKI Ryunosuke</h1>
      <p class="subtitle">いろ・啼鳥｜聴的環境｜Sound Pieces</p>
    </header>

    <img class="photo" src="profile.jpg" alt="青木隆之助｜AOKI Ryunosuke" />

    <section>
      <h2>紹介｜Profile</h2>
      <p>
        平成十五年十月九日、神奈川県川崎市川崎区生まれ。青山学院大学在学中。
        身長162cm、視力0.1程度。
      </p>
    </section>

    <section>
      <h2>作品｜Works</h2>
      <ul class="link-list">
        <li><a class="button-link" href="https://aokiryunosuke.github.io/fieldrecordingnotes/">Field Recordings</a></li>
        <li><a class="button-link" href="#">Projects</a></li>
        <li><a class="button-link" href="#">Writing</a></li>
      </ul>
    </section>

    <section>
      <h2>SNSアカウント｜Accounts</h2>
      <ul class="link-list">
        <li><a class="button-link" href="https://www.instagram.com/aoki_ryunosuke/">Instagram</a></li>
        <li><a class="button-link" href="#">GitHub</a></li>
        <li><a class="button-link" href="#">Contact</a></li>
      </ul>
    </section>

    <footer>
      <p>© AOKI Ryunosuke</p>
    </footer>
  </main>
</body>
</html>
